services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: wareboxes
      POSTGRES_PASSWORD: wareboxes
      POSTGRES_DB: wareboxes
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wareboxes -d wareboxes"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - wareboxes_pgdata:/var/lib/postgresql/data

volumes:
  wareboxes_pgdata:
