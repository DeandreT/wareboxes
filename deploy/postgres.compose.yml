name: wareboxes

services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: wareboxes
      POSTGRES_USER: wareboxes_admin
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_admin_password
      POSTGRES_APP_PASSWORD_FILE: /run/secrets/postgres_app_password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /opt/wareboxes/runtime/postgres-init/001-create-app-role.sh:/docker-entrypoint-initdb.d/001-create-app-role.sh:ro
    secrets:
      - postgres_admin_password
      - postgres_app_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wareboxes_admin -d wareboxes"]
      interval: 5s
      timeout: 5s
      retries: 20
    stop_grace_period: 60s
    shm_size: 256mb

secrets:
  postgres_admin_password:
    file: /etc/wareboxes/postgres_admin_password
  postgres_app_password:
    file: /etc/wareboxes/postgres_app_password

volumes:
  postgres_data:
