name: Site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "crates/client/**"
      - "scripts/build-site.sh"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  WAREBOXES_API_URL: https://api.88-198-229-62.sslip.io
  WAREBOXES_DEMO_EMAIL: demo@wareboxes.app
  WAREBOXES_DEMO_PASSWORD: wareboxes-demo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/trunk-action@v0.5.0
        with:
          version: latest
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build site and web client
        run: scripts/build-site.sh
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
